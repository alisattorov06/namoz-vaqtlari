name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Flutter diagnostics
        run: flutter doctor -v

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build-apk.log

      - name: Locate APK
        if: success()
        run: |
          echo "Generated APK files:"
          find build -type f -name "*.apk" -print
          test -n "$(find build -type f -name '*.apk' -print -quit)"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-apk-log
          path: build-apk.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: namoz-vaqtlari-apk
          path: build/**/*.apk
          retention-days: 30
          if-no-files-found: error
