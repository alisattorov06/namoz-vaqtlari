name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Faqat bitta workflow ishlashi uchun boshqa konflikt workflow lar o'chirilgan.
# Bu workflow to'g'ridan-to'g'ri APK build qiladi, analyze ishlatmaydi.

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Java setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: namoz-vaqtlari-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: error
