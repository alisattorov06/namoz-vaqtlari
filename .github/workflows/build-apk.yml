name: Build Namoz Vaqtlari APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Qo'lda ishga tushirish uchun

jobs:
  build:
    name: Build APK (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        target: [apk, appbundle]

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Flutter versiyasini o'rnatish
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:'
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Flutter versiyasini tekshirish
        run: |
          flutter --version
          flutter doctor -v

      - name: Pub paketlarini olish
        run: flutter pub get

      - name: Lokalizatsiya kodini generatsiya qilish
        run: flutter gen-l10n

      - name: Kodni tahlil qilish
        run: flutter analyze --no-fatal-infos

      - name: Testlarni ishga tushirish
        run: flutter test

      # Android uchun Java 17 kerak
      - name: Java 17 ni o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android ruxsatnomalarini qabul qilish
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_HOME/licenses/android-sdk-license
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: APK build qilish
        if: matrix.target == 'apk'
        run: |
          flutter build apk --release --split-per-abi

      - name: AAB build qilish
        if: matrix.target == 'appbundle'
        run: |
          flutter build appbundle --release

      - name: Build artefaktlarini saqlash
        uses: actions/upload-artifact@v4
        with:
          name: namoz-vaqtlari-${{ matrix.target }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: warn
