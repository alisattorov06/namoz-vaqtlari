name: namoz_vaqtlari
description: "O'zbekiston uchun professional Namoz Vaqtlari ilovasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Location
  geolocator: ^13.0.1

  # Compass / sensors
  flutter_compass: ^0.8.0

  # Permissions
  permission_handler: ^11.3.1

  # Date/time
  intl: ^0.19.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # UI
  google_fonts: ^6.2.1

  # Connectivity
  connectivity_plus: ^5.0.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/
