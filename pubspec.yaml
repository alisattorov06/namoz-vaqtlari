name: namoz_vaqtlari
description: "O'zbekiston uchun professional Namoz Vaqtlari ilovasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Location
  geolocator: ^13.0.1

  # Compass / sensors
  flutter_compass: ^0.8.0

  # Permissions
  permission_handler: ^11.3.1

  # Date/time
  intl: ^0.20.2
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0

  # UI
  google_fonts: ^6.2.1

  # Connectivity
  connectivity_plus: ^6.1.1

  # Vibration
  vibration: ^2.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/
